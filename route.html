<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Маршрут — Цифровой Сад</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    background:#A8D080;overflow:hidden;
    height:100%;height:100dvh;width:100%;
    touch-action:none;user-select:none;-webkit-user-select:none;
    overscroll-behavior:none;
  }
  canvas{display:block;position:fixed;top:0;left:0}

  /* header */
  #hdr{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:max(env(safe-area-inset-top),8px) 16px 8px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.3);
    display:flex;align-items:center;justify-content:space-between;
  }
  #hdr h1{font-size:16px;font-weight:800;color:#2D5016}
  #hdr a{font-size:12px;color:#5A7D3A;text-decoration:none;font-weight:700}

  /* progress */
  #progress{
    position:fixed;top:54px;left:12px;right:12px;z-index:100;
    display:flex;gap:4px;align-items:center;
  }
  .dot{
    flex:1;height:4px;border-radius:2px;
    background:rgba(255,255,255,0.35);
    transition:background 0.4s ease;
  }
  .dot.done{background:#4A7C23}
  .dot.cur{background:#6BAF3A;box-shadow:0 0 6px rgba(107,175,58,0.6)}

  /* labels */
  #labels{position:fixed;top:0;left:0;pointer-events:none;z-index:10}
  .lbl{
    position:absolute;transform:translate(-50%,6px);
    font-size:10px;font-weight:700;color:#2D3B18;
    padding:2px 6px;border-radius:4px;
    background:rgba(255,255,255,0.4);
    white-space:nowrap;pointer-events:none;
    transition:all 0.3s ease;opacity:0.5;
  }
  .lbl.vis{opacity:0.8;background:rgba(255,255,255,0.55)}
  .lbl.cur{opacity:1;font-size:12px;font-weight:800;background:rgba(255,255,220,0.95);box-shadow:0 2px 8px rgba(0,0,0,0.1)}

  /* step badge */
  .badge{
    position:absolute;transform:translate(-50%,-100%);
    top:-2px;font-size:9px;font-weight:800;
    color:#fff;background:#4A7C23;
    width:18px;height:18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,0.2);
    pointer-events:none;transition:all 0.3s ease;opacity:0;
  }
  .lbl.vis .badge,.lbl.cur .badge{opacity:1}

  /* bottom card */
  #card{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    transform:translateY(100%);
    transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
    padding-bottom:env(safe-area-inset-bottom,0);
  }
  #card.open{transform:translateY(0)}
  #card .inner{
    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    border-top:1px solid rgba(255,255,255,0.5);
    border-radius:20px 20px 0 0;
    padding:12px 20px 20px;
  }
  #card .handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,0.15);margin:0 auto 10px}
  #card .step{font-size:11px;color:#7A9E5A;font-weight:700;margin-bottom:2px}
  #card h2{font-size:20px;font-weight:800;color:#2D5016;margin-bottom:4px}
  #card .desc{font-size:13px;color:#5A7D3A;line-height:1.4;margin-bottom:14px}
  .next-btn{
    display:block;width:100%;padding:14px;
    border:none;border-radius:14px;
    background:linear-gradient(135deg,#4A7C23,#6BAF3A);
    color:#fff;font-size:15px;font-weight:700;font-family:inherit;
    cursor:pointer;transition:all 0.15s ease;
    box-shadow:0 4px 12px rgba(74,124,35,0.3);
  }
  .next-btn:active{transform:scale(0.97)}
  .next-btn.finish{background:linear-gradient(135deg,#C4863B,#E8A840)}

  @media(min-width:768px){
    #card{left:auto;right:20px;bottom:20px;width:320px;transform:translateX(360px)}
    #card.open{transform:translateX(0)}
    #card .inner{border-radius:16px}
  }
</style>
</head>
<body>
<div id="hdr">
  <h1>Маршрут</h1>
  <a href="index.html">← Карта</a>
</div>

<div id="progress"></div>

<canvas id="c"></canvas>
<div id="labels"></div>

<div id="card">
  <div class="inner">
    <div class="handle"></div>
    <div class="step" id="cStep"></div>
    <h2 id="cTitle">—</h2>
    <div class="desc" id="cDesc"></div>
    <button class="next-btn" id="cBtn">Продолжить путь →</button>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────
const N=[
  {id:'space',    l:'Космос',      gx:0,  gy:0,  r:'#5B6ABF',w:'#E8E0D0',d:'Звёзды, галактики и тайны вселенной'},
  {id:'music',    l:'Музыка',      gx:3,  gy:0.5,r:'#E85D75',w:'#F0E6D6',d:'Мелодии, ритмы и звуковые ландшафты'},
  {id:'dreams',   l:'Сны',         gx:1,  gy:2,  r:'#9B6FC3',w:'#EDE4F0',d:'Ночные путешествия подсознания'},
  {id:'philosophy',l:'Философия',  gx:5,  gy:1.5,r:'#6B8CC7',w:'#E4E8F0',d:'Вечные вопросы бытия и смысла'},
  {id:'books',    l:'Книги',       gx:7.5,gy:0.5,r:'#C4863B',w:'#F2EAD8',d:'Истории, идеи и миры на страницах'},
  {id:'langs',    l:'Языки',       gx:9.5,gy:0,  r:'#48A89C',w:'#E0F0EC',d:'Слова, грамматика и культурные коды'},
  {id:'art',      l:'Искусство',   gx:2,  gy:3.5,r:'#D4694A',w:'#F4E8E0',d:'Визуальное выражение внутреннего мира'},
  {id:'poetry',   l:'Поэзия',      gx:5,  gy:3.5,r:'#B07ACC',w:'#F0E8F4',d:'Ритм слов и образов'},
  {id:'history',  l:'История',     gx:8,  gy:2.5,r:'#8B7355',w:'#EDE6D8',d:'Уроки прошлого для настоящего'},
  {id:'arch',     l:'Архитектура', gx:10.5,gy:2, r:'#7A8B6E',w:'#E8ECE4',d:'Формы пространства и структуры'},
  {id:'films',    l:'Кино',        gx:1,  gy:5.5,r:'#C75050',w:'#F4E4E4',d:'Визуальные истории и режиссёрские миры'},
  {id:'travel',   l:'Путешествия', gx:6,  gy:5.5,r:'#4AA88C',w:'#E4F0EA',d:'Новые места, культуры и впечатления'},
  {id:'code',     l:'Код',         gx:9,  gy:4.5,r:'#5A8FA8',w:'#E4ECF0',d:'Алгоритмы и цифровое творчество'},
  {id:'games',    l:'Игры',        gx:11, gy:3.5,r:'#E8A840',w:'#F4EEE0',d:'Механики, нарративы и интерактивность'},
  {id:'photo',    l:'Фотография',  gx:3.5,gy:6.5,r:'#7A6B90',w:'#ECE8F0',d:'Мгновения, застывшие в свете'},
  {id:'cooking',  l:'Кулинария',   gx:2,  gy:8,  r:'#C87840',w:'#F4ECE0',d:'Вкусы мира и алхимия на кухне'},
  {id:'plants',   l:'Растения',    gx:5,  gy:7.5,r:'#5EA84A',w:'#E8F0E4',d:'Зелёный мир за окном и внутри'},
  {id:'health',   l:'Здоровье',    gx:7.5,gy:8.5,r:'#E07070',w:'#F4E8E8',d:'Тело, разум и баланс жизни'},
];
const allEdges=[
  ['space','dreams'],['space','philosophy'],
  ['dreams','poetry'],['dreams','art'],['dreams','films'],
  ['philosophy','books'],['philosophy','history'],['philosophy','poetry'],
  ['music','art'],['music','films'],['music','poetry'],
  ['books','langs'],['books','history'],['books','poetry'],
  ['art','photo'],['art','arch'],
  ['history','arch'],['history','langs'],
  ['films','travel'],['films','photo'],
  ['travel','cooking'],['travel','photo'],['travel','langs'],['travel','health'],
  ['code','games'],['code','arch'],
  ['photo','plants'],
  ['cooking','health'],['cooking','plants'],
  ['plants','health'],
];

// route: 10 houses, each consecutive pair connected by an edge
const route=['space','dreams','art','photo','plants','health','cooking','travel','films','music'];

const nmap={};N.forEach(n=>nmap[n.id]=n);

// trees
const trees=[];
{let s=42;const r=()=>{s=s*16807%2147483647;return(s-1)/2147483646};
for(let i=0;i<65;i++){const gx=r()*12.5-0.5,gy=r()*10-0.5;let ok=true;
for(const n of N)if((gx-n.gx)**2+(gy-n.gy)**2<0.7){ok=false;break}
if(ok)trees.push({gx,gy,tp:r()>0.4?1:0,sc:0.55+r()*0.5,ph:r()*6.28,sp:0.25+r()*0.4})}}

// ─── CANVAS SETUP ────────────────────────────────────
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
let W,H,dpr,baseSC,SC,zoom=1;
const vp={x:0,y:0};
let t=0;

function resize(){
  dpr=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  baseSC=Math.max(Math.min(W/11,H/12,55),28);
  SC=baseSC*zoom;
}
addEventListener('resize',resize);resize();

const COS30=Math.cos(Math.PI/6),SIN30=0.5;
const GCX=5.33,GCY=3.61;

function iso(gx,gy,gz){
  return{
    x:(gx-gy)*COS30*SC+W/2+vp.x-(GCX-GCY)*COS30*SC,
    y:(gx+gy)*SIN30*SC-(gz||0)*SC+H/2+vp.y-(GCX+GCY)*SIN30*SC+20
  };
}
function npos(n){return iso(n.gx,n.gy,0)}
function dep(a,b){return a+b}
function adj(hex,f){
  const ri=parseInt(hex.slice(1,3),16),gi=parseInt(hex.slice(3,5),16),bi=parseInt(hex.slice(5,7),16);
  const c=v=>Math.min(255,Math.max(0,v*f|0));
  return`rgb(${c(ri)},${c(gi)},${c(bi)})`;
}

// ─── ROUTE STATE ─────────────────────────────────────
let curStep=0; // index in route (which house hero is at / heading to)
let heroPos={gx:nmap[route[0]].gx, gy:nmap[route[0]].gy}; // current grid position of hero
let walking=false;
let walkProgress=0;
let walkFrom=null, walkTo=null;

// ─── DRAW HELPERS ────────────────────────────────────
function drawRoad(a,b,state){
  // state: 'dim','route','active','done'
  const p1=npos(a),p2=npos(b);
  const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return;
  const nx=-dy/len*12,ny=dx/len*12;
  cx.save();
  cx.beginPath();
  cx.moveTo(p1.x,p1.y);
  cx.quadraticCurveTo((p1.x+p2.x)/2+nx*0.4,(p1.y+p2.y)/2+ny*0.4,p2.x,p2.y);
  cx.lineCap='round';

  if(state==='done'){
    cx.strokeStyle='rgba(74,124,35,0.35)';cx.lineWidth=8;cx.stroke();
    cx.strokeStyle='#7AAF50';cx.lineWidth=4;cx.stroke();
  }else if(state==='active'){
    cx.strokeStyle='rgba(120,200,60,0.5)';cx.lineWidth=10;cx.stroke();
    cx.strokeStyle='#90C840';cx.lineWidth=5;cx.stroke();
    // animated dashes
    cx.strokeStyle='rgba(255,255,200,0.6)';cx.lineWidth=2;
    cx.setLineDash([6,10]);cx.lineDashOffset=-t*40;cx.stroke();cx.setLineDash([]);
  }else if(state==='route'){
    cx.strokeStyle='rgba(74,124,35,0.15)';cx.lineWidth=6;cx.stroke();
    cx.strokeStyle='#B0C898';cx.lineWidth=3;cx.stroke();
    cx.strokeStyle='rgba(255,255,240,0.2)';cx.lineWidth=1;cx.setLineDash([3,8]);cx.stroke();cx.setLineDash([]);
  }else{
    cx.strokeStyle='#C4B898';cx.lineWidth=2.5;cx.stroke();
    cx.strokeStyle='rgba(255,255,240,0.15)';cx.lineWidth=1;cx.setLineDash([3,8]);cx.stroke();cx.setLineDash([]);
  }
  cx.restore();
}

function drawTree(tr){
  const p=iso(tr.gx,tr.gy,0);
  const s=tr.sc*SC/55;
  const sw=Math.sin(t*tr.sp+tr.ph)*1.2*s;
  cx.save();cx.translate(p.x,p.y);
  cx.beginPath();cx.ellipse(3*s,5*s,8*s,4*s,0,0,6.28);
  cx.fillStyle='rgba(0,40,0,0.08)';cx.fill();
  if(tr.tp){
    cx.fillStyle='#6B4226';cx.fillRect(-1.5*s+sw*0.3,-8*s,3*s,10*s);
    [[-5,16,14,'#2D6B1E'],[-15,12,13,'#3A8528'],[-25,8,12,'#4A9A35']].forEach(([y,w,h,c])=>{
      cx.beginPath();cx.moveTo(sw,y*s-h*s);cx.lineTo(sw+w*s/2,y*s);cx.lineTo(sw-w*s/2,y*s);
      cx.closePath();cx.fillStyle=c;cx.fill();
    });
  }else{
    cx.fillStyle='#7A5230';cx.fillRect(-1.5*s+sw*0.3,-12*s,3*s,14*s);
    [[-4,2,9,8,'#3B8C2A'],[3,1,8,7,'#4AA035'],[0,-3,7,6,'#58B040']].forEach(([ox,oy,rx,ry,c])=>{
      cx.beginPath();cx.ellipse(sw+ox*s,(-18+oy)*s,rx*s,ry*s,0,0,6.28);cx.fillStyle=c;cx.fill();
    });
  }
  cx.restore();
}

function drawHouse(node){
  const routeIdx=route.indexOf(node.id);
  const onRoute=routeIdx>=0;
  const visited=onRoute&&routeIdx<curStep;
  const isCur=onRoute&&routeIdx===curStep&&!walking;
  const dimmed=!onRoute;

  const p=npos(node);
  const s=SC/55;
  const bounce=isCur?Math.sin(t*3)*1.5:0;
  const bx=p.x,by=p.y-bounce;
  const hw=15*s,iw=COS30*hw,ih=SIN30*hw;
  const wh=18*s,rh=15*s,re=3*s;

  cx.save();
  if(dimmed)cx.globalAlpha=0.35;

  // shadow
  cx.beginPath();cx.ellipse(bx+1*s,by+2*s,20*s,10*s,0,0,6.28);
  cx.fillStyle=(isCur||visited)?'rgba(80,160,40,0.18)':'rgba(0,30,0,0.1)';cx.fill();

  // glow
  if(isCur||visited){
    cx.beginPath();cx.ellipse(bx,by-wh/2,32*s,28*s,0,0,6.28);
    const g=cx.createRadialGradient(bx,by-wh/2,4*s,bx,by-wh/2,32*s);
    g.addColorStop(0,isCur?'rgba(100,200,50,0.35)':'rgba(100,200,50,0.12)');
    g.addColorStop(1,'rgba(100,200,50,0)');cx.fillStyle=g;cx.fill();
  }

  // walls
  cx.beginPath();cx.moveTo(bx,by);cx.lineTo(bx-iw,by-ih);cx.lineTo(bx-iw,by-ih-wh);cx.lineTo(bx,by-wh);cx.closePath();
  cx.fillStyle=adj(node.w,0.92);cx.fill();cx.strokeStyle='rgba(0,0,0,0.06)';cx.lineWidth=0.5;cx.stroke();
  cx.beginPath();cx.moveTo(bx,by);cx.lineTo(bx+iw,by-ih);cx.lineTo(bx+iw,by-ih-wh);cx.lineTo(bx,by-wh);cx.closePath();
  cx.fillStyle=adj(node.w,0.85);cx.fill();cx.stroke();

  // door
  const dw=4*s,dh=8*s;
  cx.beginPath();
  cx.moveTo(bx-iw*0.35,by-ih*0.35);
  cx.lineTo(bx-iw*0.35-dw*COS30,by-ih*0.35-dw*SIN30);
  cx.lineTo(bx-iw*0.35-dw*COS30,by-ih*0.35-dw*SIN30-dh);
  cx.lineTo(bx-iw*0.35,by-ih*0.35-dh);
  cx.closePath();cx.fillStyle=adj(node.r,0.55);cx.fill();

  // window
  const wo=iw*0.45,ws=4*s;
  cx.beginPath();
  cx.moveTo(bx+wo,by-ih*0.45-wh*0.4);
  cx.lineTo(bx+wo+ws*COS30,by-ih*0.45-ws*SIN30-wh*0.4);
  cx.lineTo(bx+wo+ws*COS30,by-ih*0.45-ws*SIN30-wh*0.4-ws);
  cx.lineTo(bx+wo,by-ih*0.45-wh*0.4-ws);
  cx.closePath();cx.fillStyle='rgba(180,220,255,0.6)';cx.fill();

  // roof
  const rt=by-wh-rh;
  cx.beginPath();cx.moveTo(bx,rt);cx.lineTo(bx-iw-re,by-ih-wh+re*0.3);cx.lineTo(bx,by-wh+re*0.6);cx.closePath();
  cx.fillStyle=node.r;cx.fill();
  cx.beginPath();cx.moveTo(bx,rt);cx.lineTo(bx+iw+re,by-ih-wh+re*0.3);cx.lineTo(bx,by-wh+re*0.6);cx.closePath();
  cx.fillStyle=adj(node.r,0.85);cx.fill();
  cx.beginPath();cx.moveTo(bx,rt);cx.lineTo(bx+iw+re,by-ih-wh+re*0.3);cx.lineTo(bx-iw-re,by-ih-wh+re*0.3);cx.closePath();
  cx.fillStyle=adj(node.r,0.75);cx.fill();

  // chimney
  const chx=bx-iw*0.3,chw=3*s,chh=8*s;
  cx.fillStyle='#8B7355';cx.fillRect(chx-chw/2,rt-chh+3*s,chw,chh);
  cx.fillStyle='#6B5545';cx.fillRect(chx-chw/2-0.5,rt-chh+3*s,chw+1,1.5*s);

  // smoke if current
  if(isCur){
    for(let i=0;i<3;i++){
      const st=(t*0.8+i*1.5)%4.5;
      const sx=chx+Math.sin(st*2+i)*3*s;
      const sy=rt-chh-st*7*s;
      cx.beginPath();cx.arc(sx,sy,(1.5+st*2.5)*s,0,6.28);
      cx.fillStyle=`rgba(200,200,200,${Math.max(0,1-st/4.5)*0.25})`;cx.fill();
    }
  }

  cx.restore();
  return{x:bx,y:by+4*s};
}

// ─── DRAW HERO ───────────────────────────────────────
function drawHero(){
  const hp=iso(heroPos.gx,heroPos.gy,0);
  const s=SC/55;
  const bx=hp.x, by=hp.y;
  const bob=walking?Math.abs(Math.sin(t*8))*3*s:Math.sin(t*2)*1*s;

  cx.save();
  // shadow
  cx.beginPath();cx.ellipse(bx,by+2*s,6*s,3*s,0,0,6.28);
  cx.fillStyle='rgba(0,0,0,0.15)';cx.fill();

  // body
  const bodyY=by-8*s-bob;
  // legs
  if(walking){
    const legPhase=Math.sin(t*8);
    cx.strokeStyle='#5A4030';cx.lineWidth=2*s;cx.lineCap='round';
    cx.beginPath();cx.moveTo(bx-2*s,by-2*s);cx.lineTo(bx-2*s+legPhase*3*s,bodyY+6*s);cx.stroke();
    cx.beginPath();cx.moveTo(bx+2*s,by-2*s);cx.lineTo(bx+2*s-legPhase*3*s,bodyY+6*s);cx.stroke();
  }else{
    cx.strokeStyle='#5A4030';cx.lineWidth=2*s;cx.lineCap='round';
    cx.beginPath();cx.moveTo(bx-2*s,by-1*s);cx.lineTo(bx-2*s,bodyY+6*s);cx.stroke();
    cx.beginPath();cx.moveTo(bx+2*s,by-1*s);cx.lineTo(bx+2*s,bodyY+6*s);cx.stroke();
  }

  // torso
  cx.fillStyle='#4A7C23';
  cx.beginPath();
  cx.roundRect(bx-5*s,bodyY,10*s,10*s,3*s);
  cx.fill();

  // backpack
  cx.fillStyle='#8B6B40';
  cx.fillRect(bx+3*s,bodyY+1*s,4*s,7*s);
  cx.fillStyle='#7A5C35';
  cx.fillRect(bx+3*s,bodyY+1*s,4*s,2*s);

  // head
  cx.fillStyle='#F0D0A0';
  cx.beginPath();cx.arc(bx,bodyY-5*s,5.5*s,0,6.28);cx.fill();

  // hair
  cx.fillStyle='#5A3A20';
  cx.beginPath();cx.arc(bx,bodyY-6.5*s,5.5*s,Math.PI+0.3,Math.PI*2-0.3);cx.fill();

  // eyes
  cx.fillStyle='#333';
  cx.beginPath();cx.arc(bx-2*s,bodyY-5*s,1*s,0,6.28);cx.fill();
  cx.beginPath();cx.arc(bx+2*s,bodyY-5*s,1*s,0,6.28);cx.fill();

  // smile
  cx.strokeStyle='#884430';cx.lineWidth=0.8*s;
  cx.beginPath();cx.arc(bx,bodyY-3.5*s,2*s,0.2,Math.PI-0.2);cx.stroke();

  // arms
  cx.strokeStyle='#F0D0A0';cx.lineWidth=2*s;cx.lineCap='round';
  const armSwing=walking?Math.sin(t*8)*15*Math.PI/180:0;
  cx.beginPath();cx.moveTo(bx-5*s,bodyY+2*s);cx.lineTo(bx-8*s,bodyY+8*s+Math.sin(armSwing)*3*s);cx.stroke();
  cx.beginPath();cx.moveTo(bx+4*s,bodyY+2*s);cx.lineTo(bx+4*s,bodyY+8*s-Math.sin(armSwing)*3*s);cx.stroke();

  cx.restore();
}

// ─── INTERACTION ─────────────────────────────────────
let drag=false,ds={x:0,y:0},vs={x:0,y:0},tid=null;
let pinching=false,pinchDist0=0,pinchZoom0=1;
const ZOOM_MIN=0.4,ZOOM_MAX=2.5;

function applyZoom(nz,px,py){
  nz=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,nz));
  const r=nz/zoom;if(r===1)return;
  vp.x+=(px-W/2-vp.x)*(1-r);
  vp.y+=(py-H/2-vp.y)*(1-r);
  zoom=nz;
}

cv.addEventListener('wheel',e=>{e.preventDefault();applyZoom(zoom*(e.deltaY>0?0.9:1.1),e.clientX,e.clientY)},{passive:false});

function ptrDown(x,y){drag=true;ds={x,y};vs={x:vp.x,y:vp.y}}
function ptrMove(x,y){if(drag){vp.x=vs.x+(x-ds.x);vp.y=vs.y+(y-ds.y)}}
function ptrUp(x,y){drag=false}

cv.addEventListener('mousedown',e=>{ptrDown(e.clientX,e.clientY)});
cv.addEventListener('mousemove',e=>{ptrMove(e.clientX,e.clientY);if(!drag)cv.style.cursor='grab'});
cv.addEventListener('mouseup',e=>{ptrUp(e.clientX,e.clientY)});
cv.addEventListener('mouseleave',()=>{drag=false});

function pd(e){const a=e.touches[0],b=e.touches[1];return Math.sqrt((a.clientX-b.clientX)**2+(a.clientY-b.clientY)**2)}
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===2){pinching=true;drag=false;pinchDist0=pd(e);pinchZoom0=zoom}
  else if(e.touches.length===1&&!pinching){tid=e.touches[0].identifier;ptrDown(e.touches[0].clientX,e.touches[0].clientY)}
},{passive:true});
cv.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length>=2){const d=pd(e);const nc={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};applyZoom(pinchZoom0*(d/pinchDist0),nc.x,nc.y)}
  else if(!pinching){for(const p of e.changedTouches)if(p.identifier===tid)ptrMove(p.clientX,p.clientY)}
},{passive:true});
cv.addEventListener('touchend',e=>{
  if(e.touches.length<2)pinching=false;
  for(const p of e.changedTouches)if(p.identifier===tid&&!pinching){ptrUp(p.clientX,p.clientY);tid=null}
},{passive:true});

// ─── WALKING ─────────────────────────────────────────
function startWalk(){
  if(curStep>=route.length-1)return;
  walking=true;walkProgress=0;
  walkFrom=nmap[route[curStep]];
  walkTo=nmap[route[curStep+1]];
  card.classList.remove('open');
}

function updateWalk(dt){
  if(!walking)return;
  walkProgress+=dt*0.7; // speed
  if(walkProgress>=1){
    walkProgress=1;walking=false;
    curStep++;
    heroPos.gx=walkTo.gx;heroPos.gy=walkTo.gy;
    showCard();
    panToHero();
    updateProgress();
  }else{
    // smooth bezier-ish interpolation
    const ease=walkProgress<0.5?2*walkProgress*walkProgress:1-Math.pow(-2*walkProgress+2,2)/2;
    heroPos.gx=walkFrom.gx+(walkTo.gx-walkFrom.gx)*ease;
    heroPos.gy=walkFrom.gy+(walkTo.gy-walkFrom.gy)*ease;
  }
}

function panToHero(){
  const tgt=iso(heroPos.gx,heroPos.gy,0);
  const tx=W/2-tgt.x+vp.x;
  const ty=H*0.38-tgt.y+vp.y; // offset up a bit for card
  const sx=vp.x,sy=vp.y,st=performance.now();
  (function step(now){
    const p=Math.min(1,(now-st)/500);
    const e=1-(1-p)**3;
    vp.x=sx+(tx-sx)*e;vp.y=sy+(ty-sy)*e;
    if(p<1)requestAnimationFrame(step);
  })(st);
}

// ─── UI ──────────────────────────────────────────────
const card=document.getElementById('card');
const cStep=document.getElementById('cStep');
const cTitle=document.getElementById('cTitle');
const cDesc=document.getElementById('cDesc');
const cBtn=document.getElementById('cBtn');

function showCard(){
  const n=nmap[route[curStep]];
  cStep.textContent=`Остановка ${curStep+1} из ${route.length}`;
  cTitle.textContent=n.l;
  cDesc.textContent=n.d;
  if(curStep>=route.length-1){
    cBtn.textContent='Маршрут пройден!';
    cBtn.classList.add('finish');
  }else{
    cBtn.textContent='Продолжить путь →';
    cBtn.classList.remove('finish');
  }
  setTimeout(()=>card.classList.add('open'),300);
}

cBtn.addEventListener('click',()=>{
  if(curStep>=route.length-1){
    // restart
    curStep=0;heroPos.gx=nmap[route[0]].gx;heroPos.gy=nmap[route[0]].gy;
    walking=false;updateProgress();showCard();panToHero();
  }else{
    startWalk();
  }
});

// progress dots
const progDiv=document.getElementById('progress');
function initProgress(){
  for(let i=0;i<route.length;i++){
    const d=document.createElement('div');d.className='dot';progDiv.appendChild(d);
  }
}
function updateProgress(){
  const dots=progDiv.children;
  for(let i=0;i<route.length;i++){
    dots[i].className='dot'+(i<curStep?' done':'')+(i===curStep?' cur':'');
  }
}
initProgress();updateProgress();

// labels
const $l=document.getElementById('labels');
const lbls={};
N.forEach(n=>{
  const el=document.createElement('div');el.className='lbl';
  const ri=route.indexOf(n.id);
  if(ri>=0){
    const badge=document.createElement('div');badge.className='badge';badge.textContent=ri+1;
    el.appendChild(badge);
  }
  el.appendChild(document.createTextNode(n.l));
  $l.appendChild(el);lbls[n.id]=el;
});

function updateLabels(pos){
  for(const n of N){
    const el=lbls[n.id];const p=pos[n.id];
    if(p){el.style.left=p.x+'px';el.style.top=p.y+'px'}
    const ri=route.indexOf(n.id);
    const vis=ri>=0&&ri<=curStep;
    const cur=ri===curStep&&!walking;
    el.classList.toggle('vis',vis&&!cur);
    el.classList.toggle('cur',cur);
  }
}

// ─── MAIN LOOP ───────────────────────────────────────
let lastTime=0;
function draw(now){
  const dt=Math.min((now-(lastTime||now))/1000,0.1);
  lastTime=now;
  t=now/1000;
  SC=baseSC*zoom;
  cx.clearRect(0,0,W,H);

  // sky
  const sky=cx.createLinearGradient(0,0,0,H*0.55);
  sky.addColorStop(0,'#87CEEB');sky.addColorStop(1,'#C8E6A0');
  cx.fillStyle=sky;cx.fillRect(0,0,W,H*0.55);
  // ground
  const gnd=cx.createLinearGradient(0,H*0.35,0,H);
  gnd.addColorStop(0,'#B8D890');gnd.addColorStop(1,'#A0C878');
  cx.fillStyle=gnd;cx.fillRect(0,H*0.35,W,H*0.65);

  updateWalk(dt);

  // classify edges
  const routeSet=new Set(route);

  // collect drawables
  const items=[];

  // all edges
  allEdges.forEach(e=>{
    const a=nmap[e[0]],b=nmap[e[1]];
    // check if this edge is on the route
    let edgeState='dim';
    for(let i=0;i<route.length-1;i++){
      if((route[i]===e[0]&&route[i+1]===e[1])||(route[i]===e[1]&&route[i+1]===e[0])){
        if(i<curStep) edgeState='done';
        else if(i===curStep&&walking) edgeState='active';
        else if(i===curStep) edgeState='route';
        else edgeState='route';
        break;
      }
    }
    items.push({t:'r',d:(dep(a.gx,a.gy)+dep(b.gx,b.gy))/2-100,a,b,st:edgeState});
  });

  trees.forEach(tr=>items.push({t:'t',d:dep(tr.gx,tr.gy),tr}));
  N.forEach(n=>items.push({t:'h',d:dep(n.gx,n.gy),n}));
  // hero
  items.push({t:'hero',d:dep(heroPos.gx,heroPos.gy)+0.1});

  items.sort((a,b)=>a.d-b.d);

  const lpos={};
  for(const i of items){
    if(i.t==='r')drawRoad(i.a,i.b,i.st);
    else if(i.t==='t')drawTree(i.tr);
    else if(i.t==='h')lpos[i.n.id]=drawHouse(i.n);
    else if(i.t==='hero')drawHero();
  }
  updateLabels(lpos);

  requestAnimationFrame(draw);
}

// ─── INIT ────────────────────────────────────────────
panToHero();
setTimeout(()=>showCard(),500);
requestAnimationFrame(draw);
</script>
